<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daypage</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>




    <section class="page-day">


        <!-- OVERLAY con div glassmorphism e img mese -->

        <div class="bg-overlay">
            <div class="overlay"></div>
            <div class="img-bg">
                <img src="img_mesi/1_rome.jpg" alt="">
            </div>
        </div>


        <section class="countdown-blocco">
            <p class="titolo-rovescia">Conto alla rovescia</p>
            <!-- COUNTDOWNS PANNELLI-->
            <section class="countdowns">
                <!-- Natale -->
                <div class="countdown">
                    <p class="countdown-titolo">Natale</p>
                    <p class="countdown-giorni" id="Natale">(250)</p>
                </div>
                <!-- Pasqua -->
                <div class="countdown">
                    <p class="countdown-titolo">Pasqua</p>
                    <p class="countdown-giorni" id="Pasqua">(20)</p>
                </div>
            </section>
        </section>


        <!-- SEZIONE FOOTER PRINCIPALE NOTE E SPESE -->
        <section class="footer-spese-e-note">

            <section class="spese">

                <!-- HEADER con totale spese -->
                <div class="header-totale">
                    <!-- Testo spese e note -->
                    <p class="titolo-spese">Spese e Note</p>
                    <p id="risultato-totale"> Totale oggi: 0 €</p>
                </div>




                <!-- container di TUTTI i BTN SPESE -->
                <div class="btn-spese">
                    <!-- pulsante 1 caffè -->
                    <div class="btn btn-caffè" onclick="aggiungiSpesa()">

                        <svg xmlns="http://www.w3.org/2000/svg" class="btn-svg" width="32" height="32"
                            fill="currentColor" viewBox="0 0 256 256">
                            <path
                                d="M80,56V24a8,8,0,0,1,16,0V56a8,8,0,0,1-16,0Zm40,8a8,8,0,0,0,8-8V24a8,8,0,0,0-16,0V56A8,8,0,0,0,120,64Zm32,0a8,8,0,0,0,8-8V24a8,8,0,0,0-16,0V56A8,8,0,0,0,152,64Zm96,56v8a40,40,0,0,1-37.51,39.91,96.59,96.59,0,0,1-27,40.09H208a8,8,0,0,1,0,16H32a8,8,0,0,1,0-16H56.54A96.3,96.3,0,0,1,24,136V88a8,8,0,0,1,8-8H208A40,40,0,0,1,248,120ZM200,96H40v40a80.27,80.27,0,0,0,45.12,72h69.76A80.27,80.27,0,0,0,200,136Zm32,24a24,24,0,0,0-16-22.62V136a95.78,95.78,0,0,1-1.2,15A24,24,0,0,0,232,128Z">
                            </path>
                        </svg>
                    </div>



                    <!-- pulsante 2 regalo -->
                    <div class="btn btn-regalo">
                        <!-- pulsante 2 regalo -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="btn-svg" width="32" height="32"
                            fill="currentColor" viewBox="0 0 256 256">
                            <path
                                d="M216,72H180.92c.39-.33.79-.65,1.17-1A29.53,29.53,0,0,0,192,49.57,32.62,32.62,0,0,0,158.44,16,29.53,29.53,0,0,0,137,25.91a54.94,54.94,0,0,0-9,14.48,54.94,54.94,0,0,0-9-14.48A29.53,29.53,0,0,0,97.56,16,32.62,32.62,0,0,0,64,49.57,29.53,29.53,0,0,0,73.91,71c.38.33.78.65,1.17,1H40A16,16,0,0,0,24,88v32a16,16,0,0,0,16,16v64a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V136a16,16,0,0,0,16-16V88A16,16,0,0,0,216,72ZM149,36.51a13.69,13.69,0,0,1,10-4.5h.49A16.62,16.62,0,0,1,176,49.08a13.69,13.69,0,0,1-4.5,10c-9.49,8.4-25.24,11.36-35,12.4C137.7,60.89,141,45.5,149,36.51Zm-64.09.36A16.63,16.63,0,0,1,96.59,32h.49a13.69,13.69,0,0,1,10,4.5c8.39,9.48,11.35,25.2,12.39,34.92-9.72-1-25.44-4-34.92-12.39a13.69,13.69,0,0,1-4.5-10A16.6,16.6,0,0,1,84.87,36.87ZM40,88h80v32H40Zm16,48h64v64H56Zm144,64H136V136h64Zm16-80H136V88h80v32Z">
                            </path>
                        </svg>
                    </div>
                    <!-- pulsante 3 carrello -->
                    <div class="btn btn-carrello">
                        <svg xmlns="http://www.w3.org/2000/svg " class="btn-svg" width="32" height="32"
                            fill="currentColor" viewBox="0 0 256 256">
                            <path
                                d="M230.14,58.87A8,8,0,0,0,224,56H62.68L56.6,22.57A8,8,0,0,0,48.73,16H24a8,8,0,0,0,0,16h18L67.56,172.29a24,24,0,0,0,5.33,11.27,28,28,0,1,0,44.4,8.44h45.42A27.75,27.75,0,0,0,160,204a28,28,0,1,0,28-28H91.17a8,8,0,0,1-7.87-6.57L80.13,152h116a24,24,0,0,0,23.61-19.71l12.16-66.86A8,8,0,0,0,230.14,58.87ZM104,204a12,12,0,1,1-12-12A12,12,0,0,1,104,204Zm96,0a12,12,0,1,1-12-12A12,12,0,0,1,200,204Zm4-74.57A8,8,0,0,1,196.1,136H77.22L65.59,72H214.41Z">
                            </path>
                        </svg>


                    </div>

                </div>

            </section>

            <!-- sezione note -->
            <section class="note">
                <p class="note-titolo">Note</p>
                <div class="note-riquadro">
                    <!-- p editabile con contenteditable='true' e tetto max 300 caratteri-->
                    <p id="note-input" contenteditable="true"></p>
                </div>

            </section>


        </section>
    </section>


    <script src="javascript.js"></script>
</body>

</html>
